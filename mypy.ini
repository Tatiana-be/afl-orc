[mypy]
python_version = 3.12
strict = true
ignore_missing_imports = true
explicit_package_bases = true

# Exclude stub files that will be typed during implementation
exclude = ^(tests/|poc/|src/orchestrator/storage/migrations/|src/orchestrator/api/routes/|src/orchestrator/services/|src/orchestrator/engine/workflow_engine\.py|src/orchestrator/tasks\.py|src/orchestrator/main\.py|src/orchestrator/storage/database\.py)
