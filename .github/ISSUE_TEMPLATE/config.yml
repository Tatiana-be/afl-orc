name: 🐛 Bug Report
description: File a bug report
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: ""
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: input
    id: contact
    attributes:
      label: Contact Details
      description: How can we get in touch with you if we need more info?
      placeholder: ex. email@example.com
    validations:
      required: false

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
      value: "A bug happened!"
    validations:
      required: true

  - type: dropdown
    id: version
    attributes:
      label: Version
      description: What version of AFL Orchestrator are you running?
      options:
        - 1.0.0 (Default)
        - 0.9.x (Beta)
        - Other (specify in description)
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - Parser Module
        - Workflow Engine
        - Agent Executor
        - Context Manager
        - Guardrail Engine
        - Budget Tracker
        - API/REST
        - Database/Migrations
        - Other (specify in description)
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How do you trigger this bug?
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description:
        Please copy and paste any relevant log output. This will be
        automatically formatted into code.
      render: shell
    validations:
      required: false

  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: ex. 3.11.6
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: ex. macOS 14.1, Ubuntu 22.04, Windows 11
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description:
        By submitting this issue, you agree to follow our Code of Conduct.
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true

---
name: ✨ Feature Request
description: Suggest an idea for this project
title: "[Feature]: "
labels: ["enhancement", "triage"]
assignees: ""
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a feature!

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.
      placeholder: ex. I'm always frustrated when [...]
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description:
        A clear and concise description of any alternative solutions or features
        you've considered.
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Nice to have
        - Would be great to have
        - Important
        - Critical / Blocking
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description:
        Add any other context, mockups, or screenshots about the feature request
        here.
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description:
        By submitting this issue, you agree to follow our Code of Conduct.
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true

---
name: 📝 Documentation Update
description: Suggest improvements or additions to documentation
title: "[Docs]: "
labels: ["documentation"]
assignees: ""
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve our documentation!

  - type: dropdown
    id: doc-type
    attributes:
      label: Type of Documentation
      description: What type of documentation change is this?
      options:
        - Fix typo or clarification
        - Add missing documentation
        - Update existing documentation
        - Add code examples
        - Add API documentation
        - Add tutorial/guide
        - Other (describe below)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe what documentation changes you'd like to see.
    validations:
      required: true

  - type: input
    id: page
    attributes:
      label: Affected Page(s)
      description: Link to the page(s) that need updating.
      placeholder: ex. https://docs.afl-orchestrator.com/api/workflows
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description:
        By submitting this issue, you agree to follow our Code of Conduct.
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true

---
name: 🔒 Security Issue
description: Report a security vulnerability
title: "[Security]: "
labels: ["security", "critical"]
assignees: ""
body:
  - type: markdown
    attributes:
      value: |
        **Important:** For security issues, please do not open a public issue.
        Instead, email us directly at security@afl-orchestrator.com

  - type: textarea
    id: description
    attributes:
      label: Description
      description:
        Describe the security concern (please be mindful of what you share
        publicly).
    validations:
      required: true

  - type: input
    id: contact
    attributes:
      label: Contact Email
      description: How can we reach you for follow-up?
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description:
        By submitting this issue, you agree to follow our Code of Conduct.
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
