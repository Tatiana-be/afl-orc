global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "afl-orchestrator"
    static_configs:
      - targets: ["orchestrator:8000"]
    metrics_path: "/metrics"

  - job_name: "celery-worker"
    static_configs:
      - targets: ["celery-worker:8000"]

  - job_name: "flower"
    static_configs:
      - targets: ["flower:5555"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres:9187"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis:9121"]
