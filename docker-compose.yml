version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: afl-postgres
    environment:
      POSTGRES_DB: orchestrator
      POSTGRES_USER: orchestrator
      POSTGRES_PASSWORD: changeme_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestrator"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - afl-network

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: afl-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - afl-network

  # MinIO (S3-compatible storage)
  minio:
    image: minio/minio:latest
    container_name: afl-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - afl-network

  # AFL Orchestrator API
  orchestrator:
    build:
      context: .
      target: dev
    container_name: afl-orchestrator
    command: >
      uvicorn src.orchestrator.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/src
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://orchestrator:changeme_dev@postgres:5432/orchestrator
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin_dev
      SECRET_KEY: dev_secret_key_change_in_production
      DEBUG: "true"
      LOG_LEVEL: DEBUG
    volumes:
      - .:/app
      - .venv:/app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - afl-network

  # Celery Worker
  celery-worker:
    build:
      context: .
      target: dev
    container_name: afl-celery-worker
    command: celery -A src.orchestrator.tasks worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgresql+asyncpg://orchestrator:changeme_dev@postgres:5432/orchestrator
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin_dev
      SECRET_KEY: dev_secret_key_change_in_production
      DEBUG: "true"
    volumes:
      - .:/app
      - .venv:/app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - afl-network

  # Celery Beat (Scheduler)
  celery-beat:
    build:
      context: .
      target: dev
    container_name: afl-celery-beat
    command: celery -A src.orchestrator.tasks beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://orchestrator:changeme_dev@postgres:5432/orchestrator
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev_secret_key_change_in_production
    volumes:
      - .:/app
      - .venv:/app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - afl-network

  # Flower (Celery Monitoring)
  flower:
    build:
      context: .
      target: dev
    container_name: afl-flower
    command: celery -A src.orchestrator.tasks flower --port=5555
    ports:
      - "5555:5555"
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - afl-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  afl-network:
    driver: bridge
